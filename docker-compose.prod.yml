# Produkční nasazení: image se TÁHNOU z GHCR (nebuildí se lokálně).
# Watchtower hlídá api+web a automaticky stahuje nové verze (tag :latest).
#
# Server (jednorázově): docker login ghcr.io   (PAT s read:packages)
# Start:                 docker compose -f docker-compose.prod.yml up -d
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-game}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-game}
      POSTGRES_DB: ${POSTGRES_DB:-game}
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-game}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/ondreu/unheard-scorified-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    pull_policy: always
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-game}:${POSTGRES_PASSWORD:-game}@postgres:5432/${POSTGRES_DB:-game}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?nastav JWT_SECRET v .env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ghcr.io/ondreu/unheard-scorified-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    pull_policy: always
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Žádné publikované hostové porty: provoz jde výhradně přes Cloudflare Tunnel,
    # který se připojuje vnitřní docker sítí na `caddy:80`. Tím se nic neotvírá na hostu
    # (žádný konflikt s admin UI NASu na 80/443). Viz docs/DEPLOY.md.
    expose:
      - '80'
    environment:
      DOMAIN: ${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.data/caddy:/data
    depends_on:
      - api
      - web

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    # --label-enable: hlídá jen kontejnery s labelem výše (api, web), ne DB/redis/caddy.
    command: --interval 300 --cleanup --label-enable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Pro PRIVATE GHCR packages odkomentuj (po `docker login ghcr.io` na serveru):
      # - ${HOME}/.docker/config.json:/config.json:ro

  # Vystavení hry přes vlastní doménu Cloudflare Tunnelem (jediná prod varianta —
  # bez otevírání portů, HTTPS na Cloudflare edge). Běží vždy, žádný profil.
  # V Cloudflare Zero Trust namapuj public hostname → http://caddy:80. Viz docs/DEPLOY.md.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Token z Cloudflare Zero Trust. Povinný (stejná pojistka jako JWT_SECRET) —
      # bez něj nemá produkční běh smysl, ať to spadne hlasitě místo tichého nenaběhnutí.
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?nastav TUNNEL_TOKEN v .env}
    depends_on:
      - caddy
